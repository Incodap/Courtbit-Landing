    <script>
        const API_URL = (() => {
            const h = location.hostname;
            if (h === 'localhost' || h === '127.0.0.1') return 'http://localhost:8080/api';
            if (/develop|staging|preview|vercel\.app$/i.test(h)) return 'https://courtbit-develop-production.up.railway.app/api';
            return 'https://courtbit-api-production.up.railway.app/api';
        })();

        const DEFAULT_TZ = 'America/Mexico_City';
        const TOKEN_KEY = 'courtbit_token';
        const DAY_NAMES = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
        const DAY_SHORT = ['dom','lun','mar','mié','jue','vie','sáb'];
        const MONTH_NAMES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

        const ICON_PIN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>';
        const ICON_CAL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';
        const ICON_USERS = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>';

        const state = {
            tournament: null,
            calendar: null,
            myTeamIds: new Set(),
            search: '',
            filterCategory: '',
            filterCourt: '',
            tab: 'calendar',
            user: null,
            session: false,
            pendingLinks: [],
            dismissedLinks: new Set(),
            linkingTeams: new Set(),
            linkedTeams: new Set(),
            teamsByCategory: null,
            expandedCategories: new Set()
        };

        function loadSession() {
            const token = localStorage.getItem(TOKEN_KEY);
            if (!token) { state.session = false; state.user = null; return; }
            state.session = true;
            try {
                const raw = localStorage.getItem('courtbit_user');
                state.user = raw ? JSON.parse(raw) : null;
            } catch { state.user = null; }
        }

        function openAuth(mode = 'login') {
            const modal = document.getElementById('auth-modal');
            if (!modal) return;
            setAuthMode(mode);
            clearAuthError();
            modal.hidden = false;
            requestAnimationFrame(() => modal.classList.add('open'));
            document.body.classList.add('modal-open');
            const firstInput = document.querySelector(mode === 'signup' ? '#signup-first' : '#login-email');
            setTimeout(() => firstInput && firstInput.focus(), 280);
        }

        function closeAuth() {
            const modal = document.getElementById('auth-modal');
            if (!modal) return;
            modal.classList.remove('open');
            document.body.classList.remove('modal-open');
            setTimeout(() => { modal.hidden = true; }, 280);
        }

        function setAuthMode(mode) {
            const titleEl = document.getElementById('auth-title');
            const subEl = document.getElementById('auth-subtitle');
            const tabLogin = document.getElementById('tab-login');
            const tabSignup = document.getElementById('tab-signup');
            const tabs = document.querySelector('.auth-tabs');
            const formLogin = document.getElementById('form-login');
            const formSignup = document.getElementById('form-signup');
            const formForgot = document.getElementById('form-forgot');

            if (mode === 'forgot') {
                titleEl.textContent = 'Recuperar contraseña';
                subEl.textContent = 'Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.';
                tabs.style.display = 'none';
                formLogin.classList.add('hidden');
                formSignup.classList.add('hidden');
                formForgot.classList.remove('hidden');
                const success = document.getElementById('forgot-success');
                success.textContent = '';
                success.classList.add('hidden');
            } else {
                const isSignup = mode === 'signup';
                titleEl.textContent = isSignup ? 'Crear cuenta' : 'Iniciar sesión';
                subEl.textContent = isSignup
                    ? 'Crea tu cuenta para ver tus partidos y vincular tu inscripción.'
                    : 'Entra para ver tus partidos y vincular tu inscripción.';
                tabs.style.display = '';
                tabLogin.classList.toggle('active', !isSignup);
                tabSignup.classList.toggle('active', isSignup);
                tabLogin.setAttribute('aria-selected', String(!isSignup));
                tabSignup.setAttribute('aria-selected', String(isSignup));
                formLogin.classList.toggle('hidden', isSignup);
                formSignup.classList.toggle('hidden', !isSignup);
                formForgot.classList.add('hidden');
            }
            clearAuthError();
        }

        const EYE_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        const EYE_OFF_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';

        function initPasswordToggles() {
            document.querySelectorAll('.password-toggle').forEach(btn => {
                if (btn.dataset.wired) return;
                btn.dataset.wired = 'true';
                btn.innerHTML = EYE_ICON;
                btn.addEventListener('click', () => {
                    const input = document.getElementById(btn.dataset.togglePw);
                    if (!input) return;
                    const isHidden = input.type === 'password';
                    input.type = isHidden ? 'text' : 'password';
                    btn.innerHTML = isHidden ? EYE_OFF_ICON : EYE_ICON;
                    btn.setAttribute('aria-label', isHidden ? 'Ocultar contraseña' : 'Mostrar contraseña');
                });
            });
        }

        async function handleForgot(e) {
            e.preventDefault();
            clearAuthError();
            const successEl = document.getElementById('forgot-success');
            successEl.classList.add('hidden');
            const email = document.getElementById('forgot-email').value.trim().toLowerCase();
            if (!email || !email.includes('@')) { showAuthError('Correo inválido.'); return; }
            setSubmitLoading('submit-forgot', true, 'Enviar enlace');
            try {
                await fetch(`${API_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                // Backend always returns 200 (anti-enumeration)
                successEl.textContent = 'Si el correo está registrado, te enviamos un enlace para restablecer la contraseña. Revisa tu bandeja de entrada y spam.';
                successEl.classList.remove('hidden');
                document.getElementById('forgot-email').value = '';
            } catch (err) {
                showAuthError('Error de conexión. Intenta de nuevo.');
            }
            setSubmitLoading('submit-forgot', false, 'Enviar enlace');
        }

        function showAuthError(msg) {
            const el = document.getElementById('auth-error');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function clearAuthError() {
            const el = document.getElementById('auth-error');
            el.textContent = '';
            el.classList.add('hidden');
        }

        function setSubmitLoading(btnId, loading, label) {
            const btn = document.getElementById(btnId);
            if (!btn) return;
            btn.disabled = loading;
            btn.innerHTML = loading
                ? '<span class="auth-submit-spinner" aria-hidden="true"></span>Procesando…'
                : label;
        }

        async function handleLogin(e) {
            e.preventDefault();
            clearAuthError();
            const email = document.getElementById('login-email').value.trim().toLowerCase();
            const password = document.getElementById('login-password').value;
            if (!email || !password) { showAuthError('Correo y contraseña son obligatorios.'); return; }
            setSubmitLoading('submit-login', true, 'Iniciar sesión');
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    showAuthError(data?.error || 'Correo o contraseña incorrectos.');
                    setSubmitLoading('submit-login', false, 'Iniciar sesión');
                    return;
                }
                onAuthSuccess(data);
            } catch (err) {
                showAuthError('Error de conexión. Intenta de nuevo.');
                setSubmitLoading('submit-login', false, 'Iniciar sesión');
            }
        }

        const PHONE_RULES = {
            '+52': { iso: 'MX', length: 10 },
            '+1':  { iso: 'US', length: 10 },
            '+34': { iso: 'ES', length: 9 },
            '+54': { iso: 'AR', length: 10 },
            '+56': { iso: 'CL', length: 9 },
            '+57': { iso: 'CO', length: 10 },
            '+58': { iso: 'VE', length: 10 },
            '+502':{ iso: 'GT', length: 8 },
            '+503':{ iso: 'SV', length: 8 },
            '+504':{ iso: 'HN', length: 8 },
            '+505':{ iso: 'NI', length: 8 },
            '+506':{ iso: 'CR', length: 8 },
            '+507':{ iso: 'PA', length: 8 },
            '+51': { iso: 'PE', length: 9 },
            '+593':{ iso: 'EC', length: 9 },
            '+595':{ iso: 'PY', length: 9 },
            '+598':{ iso: 'UY', length: 8 },
            '+591':{ iso: 'BO', length: 8 }
        };

        function normalizePhone(prefix, raw) {
            const digits = String(raw || '').replace(/[^0-9]/g, '');
            if (!digits) return '';
            return `${prefix}${digits}`;
        }

        function countryIsoForPrefix(prefix) {
            return PHONE_RULES[prefix]?.iso || null;
        }

        function validatePhoneInput(prefix, raw) {
            const digits = String(raw || '').replace(/[^0-9]/g, '');
            if (!digits) return 'Ingresa tu número de teléfono.';
            const rule = PHONE_RULES[prefix];
            if (rule && digits.length !== rule.length) {
                return `El teléfono para ${prefix} debe tener exactamente ${rule.length} dígitos.`;
            }
            if (/^0+$/.test(digits)) return 'Teléfono inválido.';
            if (/^(\d)\1{6,}$/.test(digits)) return 'Teléfono inválido (todos los dígitos iguales).';
            if (/^(0|1)/.test(digits)) return 'El teléfono no puede empezar con 0 o 1.';
            return null;
        }

        async function handleSignup(e) {
            e.preventDefault();
            clearAuthError();
            const first = document.getElementById('signup-first').value.trim();
            const last = document.getElementById('signup-last').value.trim();
            const email = document.getElementById('signup-email').value.trim().toLowerCase();
            const password = document.getElementById('signup-password').value;
            const prefix = document.getElementById('signup-phone-prefix').value;
            const phoneRaw = document.getElementById('signup-phone').value;
            const gender = (document.querySelector('input[name="signup-gender"]:checked') || {}).value || '';

            const passwordConfirm = document.getElementById('signup-password-confirm').value;
            if (!first || !last) { showAuthError('Nombre y apellido son obligatorios.'); return; }
            if (!email || !email.includes('@')) { showAuthError('Correo inválido.'); return; }
            if (password.length < 8) { showAuthError('La contraseña debe tener al menos 8 caracteres.'); return; }
            if (password !== passwordConfirm) { showAuthError('Las contraseñas no coinciden.'); return; }
            const phoneError = validatePhoneInput(prefix, phoneRaw);
            if (phoneError) { showAuthError(phoneError); return; }
            if (!gender) { showAuthError('Selecciona tu género.'); return; }
            const consent = document.getElementById('signup-consent').checked;
            if (!consent) { showAuthError('Debes aceptar los Términos y el Aviso de Privacidad.'); return; }
            const phone = normalizePhone(prefix, phoneRaw);

            setSubmitLoading('submit-signup', true, 'Crear cuenta');
            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email,
                        password,
                        first_name: first,
                        last_name: last,
                        phone,
                        gender,
                        country_iso: countryIsoForPrefix(prefix),
                        terms_accepted: true,
                        privacy_accepted: true
                    })
                });
                const data = await res.json();
                if (!res.ok) {
                    const msg = data?.errors ? data.errors.join(' ') : (data?.error || 'No pudimos crear la cuenta.');
                    const looksLikeExistingEmail = /ya.*registrad|already.*exists|409/i.test(msg) && /email|correo/i.test(msg);
                    if (looksLikeExistingEmail) {
                        showAuthError('Si ya tienes cuenta con este correo, inicia sesión o recupera tu contraseña.');
                        const errEl = document.getElementById('auth-error');
                        if (errEl) {
                            errEl.innerHTML = `Si ya tienes cuenta con este correo, <button type="button" class="auth-link" data-auth-mode="login" style="padding:0">inicia sesión</button> o <button type="button" class="auth-link" data-auth-mode="forgot" style="padding:0">recupera tu contraseña</button>.`;
                        }
                    } else {
                        showAuthError(msg);
                    }
                    setSubmitLoading('submit-signup', false, 'Crear cuenta');
                    return;
                }
                onAuthSuccess(data);
            } catch (err) {
                showAuthError('Error de conexión. Intenta de nuevo.');
                setSubmitLoading('submit-signup', false, 'Crear cuenta');
            }
        }

        async function onAuthSuccess(data) {
            localStorage.setItem(TOKEN_KEY, data.token);
            if (data.user) localStorage.setItem('courtbit_user', JSON.stringify(data.user));
            state.session = true;
            state.user = data.user || null;
            closeAuth();
            setSubmitLoading('submit-login', false, 'Iniciar sesión');
            setSubmitLoading('submit-signup', false, 'Crear cuenta');
            if (state.calendar?.tournament_id) {
                state.myTeamIds = new Set();
                await loadMyContext(state.calendar.tournament_id);
                state.pendingLinks = await loadPendingLinks(state.calendar.tournament_id);
            }
            renderNavRight();
            refreshDynamic();
        }

        function wireAuthModal() {
            document.getElementById('auth-close').addEventListener('click', closeAuth);
            document.getElementById('auth-modal').addEventListener('click', e => {
                if (e.target.id === 'auth-modal') closeAuth();
            });
            document.querySelectorAll('[data-auth-mode]').forEach(btn => {
                btn.addEventListener('click', () => setAuthMode(btn.dataset.authMode));
            });
            document.getElementById('form-login').addEventListener('submit', handleLogin);
            document.getElementById('form-signup').addEventListener('submit', handleSignup);
            document.getElementById('form-forgot').addEventListener('submit', handleForgot);
            initPasswordToggles();
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape' && document.getElementById('auth-modal')?.classList.contains('open')) closeAuth();
            });
            document.addEventListener('click', e => {
                const trigger = e.target.closest('[data-open-auth]');
                if (!trigger) return;
                e.preventDefault();
                openAuth(trigger.dataset.openAuth || 'login');
            });
        }

        function userInitials() {
            const u = state.user || {};
            const first = (u.first_name || '').trim();
            const last = (u.last_name || '').trim();
            const fromName = (first[0] || '') + (last[0] || '');
            if (fromName) return fromName.toUpperCase();
            const email = (u.email || '').trim();
            return email ? email[0].toUpperCase() : '?';
        }

        function userDisplayName() {
            const u = state.user || {};
            const first = (u.first_name || '').trim();
            return first || (u.email || '').split('@')[0] || 'Usuario';
        }

        function renderNavRight() {
            const el = document.getElementById('nav-right');
            if (!el) return;
            if (state.session) {
                el.innerHTML = `
                    <span class="user-chip">
                        <span>${escapeHtml(userDisplayName())}</span>
                        <span class="avatar">${escapeHtml(userInitials())}</span>
                    </span>
                    <button class="logout-link" id="logout-btn" type="button">Cerrar sesión</button>`;
                document.getElementById('logout-btn').addEventListener('click', () => {
                    localStorage.removeItem(TOKEN_KEY);
                    localStorage.removeItem('courtbit_user');
                    state.session = false;
                    state.user = null;
                    state.myTeamIds = new Set();
                    renderNavRight();
                    refreshDynamic();
                });
            } else {
                el.innerHTML = `<button type="button" class="login-btn" data-open-auth="login">Iniciar sesión</button>`;
            }
        }

        function renderLoginCTA() {
            if (state.session) return '';
            return `<div class="login-hint">
                <span>¿Juegas este torneo? <a href="#" data-open-auth="login">Inicia sesión</a> · <a href="#" data-open-auth="signup">Crear cuenta</a> para verlos primero.</span>
            </div>`;
        }

        function visiblePendingLinks() {
            return (state.pendingLinks || []).filter(link => {
                const key = `${link.team_id}:${link.player_position}`;
                return !state.dismissedLinks.has(key) && !state.linkedTeams.has(link.team_id);
            });
        }

        function renderLinkBanner() {
            if (!state.session) return '';
            const visible = visiblePendingLinks();
            if (visible.length === 0) return '';
            const intro = visible.length === 1
                ? '<p>Encontramos un partido a tu nombre que aún no está vinculado. Confirma para verlo en "Mis partidos".</p>'
                : `<p>Encontramos ${visible.length} partidos a tu nombre. Confirma cuáles te pertenecen.</p>`;
            const items = visible.map(link => {
                const key = `${link.team_id}:${link.player_position}`;
                const isLinking = state.linkingTeams.has(key);
                const isFuzzy = link.match_type === 'fuzzy';
                return `<div class="link-item" data-link-key="${escapeHtml(key)}">
                    <div class="link-item-info">
                        <div class="link-item-name">${escapeHtml(link.name)}${isFuzzy ? '<span class="link-item-fuzzy">Revisa</span>' : ''}</div>
                        <div class="link-item-meta">${escapeHtml(link.category_name)} · ${escapeHtml(link.tournament_name)}${isFuzzy ? ' · tu teléfono difiere por 1 dígito' : ''}</div>
                    </div>
                    <div class="link-item-actions">
                        <button class="link-btn link-btn-yes" data-link-action="confirm" data-team-id="${escapeHtml(link.team_id)}" data-position="${escapeHtml(link.player_position)}"${isLinking ? ' disabled' : ''}>${isLinking ? 'Vinculando…' : 'Sí, soy yo'}</button>
                        <button class="link-btn link-btn-no" data-link-action="dismiss" data-key="${escapeHtml(key)}">No es mío</button>
                    </div>
                </div>`;
            }).join('');
            return `<div class="link-banner">
                <h3>¿Eres tú?</h3>
                ${intro}
                ${items}
            </div>`;
        }

        async function loadPendingLinks(tournamentId) {
            const token = localStorage.getItem(TOKEN_KEY);
            if (!token) return [];
            try {
                const res = await fetch(`${API_URL}/player-links/pending?tournament_id=${encodeURIComponent(tournamentId)}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) { localStorage.removeItem(TOKEN_KEY); return []; }
                if (!res.ok) return [];
                const data = await res.json();
                return Array.isArray(data?.tournament_links) ? data.tournament_links : [];
            } catch (err) {
                console.warn('pending-links failed', err);
                return [];
            }
        }

        async function confirmLink(teamId, position) {
            const token = localStorage.getItem(TOKEN_KEY);
            if (!token) return false;
            const key = `${teamId}:${position}`;
            state.linkingTeams.add(key);
            refreshLinkBanner();
            try {
                const res = await fetch(`${API_URL}/player-links/link-tournament`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ team_id: teamId, player_position: position })
                });
                state.linkingTeams.delete(key);
                if (res.ok) {
                    state.linkedTeams.add(teamId);
                    state.myTeamIds.add(teamId);
                    refreshDynamic();
                    return true;
                }
                refreshLinkBanner();
                return false;
            } catch (err) {
                state.linkingTeams.delete(key);
                refreshLinkBanner();
                return false;
            }
        }

        function refreshLinkBanner() {
            const slot = document.getElementById('link-banner-slot');
            if (slot) slot.innerHTML = renderLinkBanner();
        }

        function attachLinkBannerEvents() {
            document.addEventListener('click', e => {
                const btn = e.target.closest('[data-link-action]');
                if (!btn) return;
                const action = btn.dataset.linkAction;
                if (action === 'confirm') {
                    const teamId = btn.dataset.teamId;
                    const position = btn.dataset.position;
                    confirmLink(teamId, position);
                } else if (action === 'dismiss') {
                    state.dismissedLinks.add(btn.dataset.key);
                    refreshLinkBanner();
                }
            });
        }

        function extractShareCode() {
            const path = location.pathname.replace(/\/+$/, '');
            const fromPath = path.match(/\/torneo\/([a-z0-9]{8})/i);
            if (fromPath) return fromPath[1].toLowerCase();
            const qs = new URLSearchParams(location.search);
            return (qs.get('code') || qs.get('share_code') || '').toLowerCase();
        }

        function escapeHtml(text) {
            if (text == null) return '';
            return String(text).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        function highlight(text, query) {
            if (!query || !text) return escapeHtml(text);
            const safe = escapeHtml(text);
            const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const re = new RegExp(`(${escapedQuery})`, 'gi');
            return safe.replace(re, '<mark>$1</mark>');
        }

        function formatDate(iso) {
            const d = new Date(iso + (iso.length === 10 ? 'T00:00:00' : ''));
            return `${d.getDate()} ${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`;
        }

        function formatDateRange(start, end) {
            if (!start) return '';
            if (!end || start === end) return formatDate(start);
            const a = new Date(start + 'T00:00:00');
            const b = new Date(end + 'T00:00:00');
            if (a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth()) {
                return `${a.getDate()}–${b.getDate()} ${MONTH_NAMES[a.getMonth()]} ${a.getFullYear()}`;
            }
            return `${formatDate(start)} — ${formatDate(end)}`;
        }

        function tournamentTZ() {
            return state.calendar?.organizer_timezone
                || state.tournament?.organizer?.timezone
                || DEFAULT_TZ;
        }

        function toLocalParts(isoString) {
            const d = new Date(isoString);
            const fmt = new Intl.DateTimeFormat('en-CA', {
                timeZone: tournamentTZ(),
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', hour12: false
            });
            const parts = Object.fromEntries(fmt.formatToParts(d).map(p => [p.type, p.value]));
            return {
                date: `${parts.year}-${parts.month}-${parts.day}`,
                time: `${parts.hour}:${parts.minute}`
            };
        }

        function dayLabel(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return `${DAY_NAMES[d.getDay()]} ${d.getDate()} de ${MONTH_NAMES[d.getMonth()]}`;
        }

        function dayShortLabel(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return `${DAY_SHORT[d.getDay()]} ${d.getDate()}/${(d.getMonth() + 1).toString().padStart(2, '0')}`;
        }

        function findCourtLabel(courts, number, courtLabelFromMatch) {
            if (courtLabelFromMatch && String(courtLabelFromMatch).trim()) return courtLabelFromMatch;
            if (number == null) return '';
            if (Array.isArray(courts)) {
                const found = courts.find(c => c.number === number);
                if (found && found.name && String(found.name).trim()) return `Cancha ${found.name}`;
            }
            return `Cancha ${number}`;
        }

        function matchEndMs(m) {
            if (!m.scheduled_time) return null;
            const dur = state.calendar?.scheduling_config?.match_duration_minutes ?? 90;
            return new Date(m.scheduled_time).getTime() + dur * 60000;
        }

        function isPast(m) {
            const end = matchEndMs(m);
            return end != null && end < Date.now();
        }

        function isMine(m) {
            if (!state.myTeamIds.size) return false;
            return (m.team1 && state.myTeamIds.has(m.team1.id)) || (m.team2 && state.myTeamIds.has(m.team2.id));
        }

        function matchMatchesSearch(m, query) {
            if (!query) return true;
            const q = query.toLowerCase();
            const names = [
                m.team1?.player_a, m.team1?.player_b,
                m.team2?.player_a, m.team2?.player_b
            ].filter(Boolean);
            return names.some(n => n.toLowerCase().includes(q));
        }

        function applyFilters(matches) {
            return matches.filter(m => {
                if (state.filterCategory && String(m.category_id) !== String(state.filterCategory)) return false;
                if (state.filterCourt && String(m.court_number) !== String(state.filterCourt)) return false;
                if (!matchMatchesSearch(m, state.search)) return false;
                return true;
            });
        }

        function renderError(title, msg) {
            document.getElementById('main').innerHTML = `
                <div class="state">
                    <h2>${escapeHtml(title)}</h2>
                    <p>${escapeHtml(msg)}</p>
                </div>`;
        }

        function renderTeam(team, isWinner) {
            if (!team) {
                return `<div class="match-team"><div class="player empty">Por definir</div></div>`;
            }
            const seedTag = team.seed ? `<span class="seed">#${team.seed}</span>` : '';
            const pa = team.player_a ? highlight(team.player_a, state.search) : '<span class="empty">Pareja sin jugador A</span>';
            const pb = team.player_b ? highlight(team.player_b, state.search) : '<span class="empty">Pareja sin jugador B</span>';
            const cls = isWinner ? 'match-team winner' : 'match-team';
            return `<div class="${cls}">
                <div class="player">${seedTag}${pa}</div>
                <div class="player">${pb}</div>
            </div>`;
        }

        function renderScore(m) {
            if (m.is_bye) return `<div class="match-score pending">BYE</div>`;
            if (m.status === 'completed' && (m.score_team1 != null || m.score_team2 != null)) {
                let sets = '';
                if (Array.isArray(m.set_scores) && m.set_scores.length > 0) {
                    sets = m.set_scores.map(s => `${s.team1 ?? '-'}-${s.team2 ?? '-'}`).join(' · ');
                }
                return `<div class="match-score">${m.score_team1 ?? '-'} – ${m.score_team2 ?? '-'}<span class="score-line">${escapeHtml(sets)}</span></div>`;
            }
            if (m.status === 'in_progress') return `<div class="match-score pending" style="color: var(--warning);">EN JUEGO</div>`;
            return `<div class="match-score pending">Pendiente</div>`;
        }

        function renderMatch(m, courts, opts = {}) {
            const localParts = m.scheduled_time ? toLocalParts(m.scheduled_time) : null;
            const courtLabel = findCourtLabel(courts, m.court_number, m.court_label);
            const dayMini = opts.showDay && localParts ? `<span class="day-mini">${escapeHtml(dayShortLabel(localParts.date))}</span>` : '';
            const time = localParts ? localParts.time : 'Por programar';
            const isWinner1 = m.winner_team === 1;
            const isWinner2 = m.winner_team === 2;
            const mine = isMine(m);
            return `<div class="match-card${mine ? ' mine' : ''}" data-category="${m.category_id}" data-court="${m.court_number ?? ''}">
                <div>
                    <div class="match-time">${dayMini}${time}<span class="court">${escapeHtml(courtLabel)}</span></div>
                </div>
                <div>
                    <div class="match-tag">${escapeHtml(m.category_name || '')} · ${escapeHtml(m.round_name || '')}</div>
                    ${renderTeam(m.team1, isWinner1)}
                </div>
                <div>
                    <div class="match-tag" style="visibility: hidden;">.</div>
                    ${renderTeam(m.team2, isWinner2)}
                </div>
                ${renderScore(m)}
            </div>`;
        }

        function groupByDay(matches) {
            const groups = new Map();
            const noDate = [];
            for (const m of matches) {
                if (!m.scheduled_time) { noDate.push(m); continue; }
                const { date } = toLocalParts(m.scheduled_time);
                if (!groups.has(date)) groups.set(date, []);
                groups.get(date).push(m);
            }
            return { groups, noDate };
        }

        function sortMatchesAsc(arr) {
            return arr.slice().sort((a, b) => {
                const ta = a.scheduled_time ? new Date(a.scheduled_time).getTime() : Infinity;
                const tb = b.scheduled_time ? new Date(b.scheduled_time).getTime() : Infinity;
                if (ta !== tb) return ta - tb;
                return (a.court_number ?? 999) - (b.court_number ?? 999);
            });
        }

        function renderDayBlocks(matches, courts, descending = false) {
            const { groups, noDate } = groupByDay(matches);
            const dateKeys = [...groups.keys()].sort();
            if (descending) dateKeys.reverse();
            const blocks = dateKeys.map(date => {
                let items = sortMatchesAsc(groups.get(date));
                if (descending) items = items.reverse();
                const cards = items.map(m => renderMatch(m, courts)).join('');
                return `<div class="day-block">
                    <div class="day-header" data-date="${escapeHtml(date)}">${dayLabel(date)}</div>
                    <div class="match-list">${cards}</div>
                </div>`;
            }).join('');
            const noDateBlock = noDate.length > 0 && !descending ? `<div class="day-block">
                <div class="day-header">Por programar</div>
                <div class="match-list">${noDate.map(m => renderMatch(m, courts)).join('')}</div>
            </div>` : '';
            return blocks + noDateBlock;
        }

        function renderMyBlock() {
            if (!state.myTeamIds.size) return '';
            const courts = state.calendar.scheduling_config?.courts || [];
            const mine = (state.calendar.matches || []).filter(isMine);
            const filtered = applyFilters(mine);
            if (filtered.length === 0) {
                return `<div class="my-block">
                    <div class="panel-title"><span class="badge">TU</span> Mis partidos</div>
                    <div class="empty-state">No hay partidos que coincidan con la búsqueda/filtro actual.</div>
                </div>`;
            }
            const upcoming = sortMatchesAsc(filtered.filter(m => !isPast(m)));
            const past = sortMatchesAsc(filtered.filter(isPast)).reverse();
            const upcomingHtml = upcoming.length > 0
                ? `<div class="sub-section-title">Próximos <span class="count">${upcoming.length}</span></div>
                   <div class="match-list">${upcoming.map(m => renderMatch(m, courts, { showDay: true })).join('')}</div>`
                : `<div class="sub-section-title">Próximos <span class="count">0</span></div>
                   <div class="empty-state">No tienes más partidos por jugar.</div>`;
            const pastHtml = past.length > 0
                ? `<div class="sub-section-title">Ya jugados <span class="count">${past.length}</span></div>
                   <div class="match-list past-section">${past.map(m => renderMatch(m, courts, { showDay: true })).join('')}</div>`
                : '';
            return `<div class="my-block">
                <div class="panel-title"><span class="badge">TU</span> Mis partidos</div>
                <div class="panel-subtitle">Solo los partidos donde participas.</div>
                ${upcomingHtml}
                ${pastHtml}
            </div>`;
        }

        function renderAllCalendar() {
            const courts = state.calendar.scheduling_config?.courts || [];
            const filtered = applyFilters(state.calendar.matches || []);
            if (filtered.length === 0) {
                return `<div class="empty-state">No hay partidos que coincidan con la búsqueda y filtros.</div>`;
            }
            const upcoming = filtered.filter(m => !isPast(m));
            const past = filtered.filter(isPast);
            const upcomingHtml = upcoming.length > 0
                ? `<div class="sub-section-title">Próximos <span class="count">${upcoming.length}</span></div>
                   ${renderDayBlocks(upcoming, courts, false)}`
                : '';
            const pastHtml = past.length > 0
                ? `<div class="sub-section-title">Ya jugados <span class="count">${past.length}</span></div>
                   <div class="past-section">${renderDayBlocks(past, courts, true)}</div>`
                : '';
            return upcomingHtml + pastHtml;
        }

        function renderDayJump() {
            const days = state.calendar?.scheduling_config?.tournament_days || [];
            if (days.length < 2) return '';
            const todayLocal = (() => {
                const d = new Date();
                const fmt = new Intl.DateTimeFormat('en-CA', { timeZone: tournamentTZ(), year: 'numeric', month: '2-digit', day: '2-digit' });
                const parts = Object.fromEntries(fmt.formatToParts(d).map(p => [p.type, p.value]));
                return `${parts.year}-${parts.month}-${parts.day}`;
            })();
            const buttons = days.map(d => {
                const date = new Date(d + 'T00:00:00');
                const isToday = d === todayLocal;
                const isPastDay = d < todayLocal;
                return `<button data-day-jump="${escapeHtml(d)}" class="${isToday ? 'today' : ''}${isPastDay ? ' past' : ''}">
                    <span class="dj-day">${DAY_SHORT[date.getDay()]}</span>
                    <span class="dj-date">${date.getDate()}</span>
                </button>`;
            }).join('');
            return `<div class="day-jump-wrap"><div class="day-jump" id="day-jump">${buttons}</div></div>`;
        }

        function scrollToDay(dateStr) {
            const blocks = document.querySelectorAll('#calendar-slot .day-block');
            for (const b of blocks) {
                const header = b.querySelector('.day-header');
                if (!header) continue;
                if (header.dataset.date === dateStr) {
                    const navH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--nav-h')) || 60;
                    const tabsH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--tabs-h')) || 50;
                    const dayJumpEl = document.querySelector('.day-jump-wrap');
                    const dayJumpH = dayJumpEl ? dayJumpEl.offsetHeight : 0;
                    const offset = navH + tabsH + dayJumpH + 8;
                    const top = b.getBoundingClientRect().top + window.scrollY - offset;
                    window.scrollTo({ top, behavior: 'smooth' });
                    return;
                }
            }
        }

        function activeFilterCount() {
            let n = 0;
            if (state.filterCategory !== '') n++;
            if (state.filterCourt !== '') n++;
            return n;
        }

        function renderFiltersHtml() {
            const cats = state.calendar?.brackets || [];
            const courts = (state.calendar?.scheduling_config?.courts || []).filter(c => c.is_active !== false);
            const catChips = cats.map(b => `<button class="filter-chip${String(state.filterCategory) === String(b.category_id) ? ' active' : ''}" data-filter="category" data-value="${b.category_id}">${escapeHtml(b.category_name)}</button>`).join('');
            const courtChips = courts.map(c => `<button class="filter-chip${String(state.filterCourt) === String(c.number) ? ' active' : ''}" data-filter="court" data-value="${c.number}">Cancha ${escapeHtml(c.name || c.number)}</button>`).join('');
            return `<div class="sheet-section">
                <div class="sheet-section-title">Categoría</div>
                <div class="filters" data-filter-row="category">
                    <button class="filter-chip${state.filterCategory === '' ? ' active' : ''}" data-filter="category" data-value="">Todas</button>
                    ${catChips}
                </div>
            </div>
            <div class="sheet-section">
                <div class="sheet-section-title">Cancha</div>
                <div class="filters" data-filter-row="court">
                    <button class="filter-chip${state.filterCourt === '' ? ' active' : ''}" data-filter="court" data-value="">Todas</button>
                    ${courtChips}
                </div>
            </div>`;
        }

        function initials(name) {
            if (!name) return '?';
            const parts = String(name).trim().split(/\s+/);
            const a = parts[0]?.[0] || '';
            const b = parts[1]?.[0] || '';
            return (a + b).toUpperCase() || '?';
        }

        function isSafePhotoUrl(url) {
            if (!url || typeof url !== 'string') return false;
            try {
                const u = new URL(url);
                return u.protocol === 'https:';
            } catch { return false; }
        }

        function renderAvatar(player) {
            if (!player || !player.name) {
                return `<span class="avatar" aria-hidden="true">?</span>`;
            }
            const linkedClass = player.linked ? ' linked' : '';
            const initialsStr = initials(player.name);
            if (isSafePhotoUrl(player.photo_url)) {
                return `<span class="avatar has-photo${linkedClass}" data-initials="${escapeHtml(initialsStr)}" aria-label="${escapeHtml(player.name)}"><img src="${escapeHtml(player.photo_url)}" alt="" loading="lazy" decoding="async" referrerpolicy="no-referrer" data-avatar-img></span>`;
            }
            return `<span class="avatar${linkedClass}" aria-label="${escapeHtml(player.name)}">${escapeHtml(initialsStr)}</span>`;
        }

        function renderPairRow(team) {
            const a = team.player_a || {};
            const b = team.player_b || {};
            return `<div class="pair-row">
                <div class="pair-avatars">
                    ${renderAvatar(a)}
                    ${renderAvatar(b)}
                </div>
                <div class="pair-names">
                    <div class="player-name">${escapeHtml(a.name || 'Por definir')}</div>
                    <div class="player-name">${escapeHtml(b.name || 'Por definir')}</div>
                </div>
            </div>`;
        }

        function renderCategoryCard(cat) {
            const count = cat.registered_count ?? 0;
            const cap = cat.max_teams ? ` / ${cat.max_teams}` : '';
            const isExpanded = state.expandedCategories.has(cat.id);
            const teams = state.teamsByCategory?.get(cat.id) || null;
            const teamsHtml = !teams
                ? `<div class="cat-teams-empty">Cargando parejas…</div>`
                : teams.length === 0
                    ? `<div class="cat-teams-empty">Aún no hay parejas inscritas.</div>`
                    : teams.map(renderPairRow).join('');
            const chevron = '<svg class="cat-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
            return `<div class="cat-card${isExpanded ? ' expanded' : ''}" data-category-id="${cat.id}">
                <button class="cat-header" type="button" data-cat-toggle="${cat.id}" aria-expanded="${isExpanded}">
                    <div class="cat-header-text">
                        <div class="cat-name">${escapeHtml(cat.name)}</div>
                        <div class="cat-meta"><strong>${count}</strong>${cap} parejas inscritas</div>
                    </div>
                    ${chevron}
                </button>
                <div class="cat-teams">${teamsHtml}</div>
            </div>`;
        }

        function renderCategoriesPanel() {
            const cats = state.tournament.categories || [];
            if (cats.length === 0) {
                return `<div class="empty-state">Aún no se han definido categorías para este torneo.</div>`;
            }
            return `<div class="cat-grid">${cats.map(renderCategoryCard).join('')}</div>`;
        }

        async function loadTournamentTeams(code) {
            try {
                const res = await fetch(`${API_URL}/public/tournaments/by-share-code/${code}/teams`);
                if (!res.ok) return null;
                const data = await res.json();
                const map = new Map();
                for (const c of (data?.categories || [])) {
                    map.set(c.id, c.teams || []);
                }
                state.teamsByCategory = map;
                const panel = document.getElementById('panel-categories');
                if (panel) {
                    const container = panel.querySelector('.cat-grid');
                    if (container) container.innerHTML = (state.tournament.categories || []).map(renderCategoryCard).join('');
                }
            } catch (err) { console.warn('teams load failed', err); }
        }

        function tzShortLabel(tz) {
            try {
                const fmt = new Intl.DateTimeFormat('es-MX', { timeZone: tz, timeZoneName: 'short' });
                const part = fmt.formatToParts(new Date()).find(p => p.type === 'timeZoneName');
                return part ? part.value : tz;
            } catch { return tz; }
        }

        function visitorTZ() {
            try { return Intl.DateTimeFormat().resolvedOptions().timeZone || ''; } catch { return ''; }
        }

        function tzMatchesVisitor(tz) {
            const v = visitorTZ();
            if (!v || !tz) return true;
            if (v === tz) return true;
            try {
                const sample = new Date();
                const a = new Intl.DateTimeFormat('en-US', { timeZone: tz, hour: '2-digit', hour12: false }).format(sample);
                const b = new Intl.DateTimeFormat('en-US', { timeZone: v, hour: '2-digit', hour12: false }).format(sample);
                return a === b;
            } catch { return tz === v; }
        }

        function renderHero() {
            const t = state.tournament;
            const flyerHtml = t.flyer_url
                ? `<img src="${escapeHtml(t.flyer_url)}" alt="${escapeHtml(t.name)}" onerror="this.parentElement.innerHTML='<div class=&quot;hero-flyer-fallback&quot;>🎾</div>'">`
                : `<div class="hero-flyer-fallback">🎾</div>`;
            const organizer = t.organizer || {};
            const orgPill = organizer.name ? `<div class="organizer-pill">
                ${organizer.logo_url ? `<img src="${escapeHtml(organizer.logo_url)}" alt="">` : ''}
                Organiza ${escapeHtml(organizer.name)}
            </div>` : '';
            const matchCount = (state.calendar.matches || []).filter(m => !m.is_bye).length;
            const tz = tournamentTZ();
            const showTzNote = !tzMatchesVisitor(tz);
            const tzNote = showTzNote
                ? `<div class="tz-note" title="${escapeHtml(tz)}">Horarios en ${escapeHtml(tzShortLabel(tz))} (zona del organizador)</div>`
                : '';
            return `<section class="hero">
                <div class="container">
                    <div class="hero-grid">
                        <div class="hero-flyer">${flyerHtml}</div>
                        <div class="hero-info">
                            ${orgPill}
                            <h1>${escapeHtml(t.name || 'Torneo')}</h1>
                            <div class="hero-meta">
                                <div>${ICON_CAL}<span>${escapeHtml(formatDateRange(t.start_date, t.end_date))}</span></div>
                                ${t.location ? `<div>${ICON_PIN}<span>${escapeHtml(t.location)}</span></div>` : ''}
                                <div>${ICON_USERS}<span>${matchCount} partidos · ${(t.categories || []).length} categorías</span></div>
                            </div>
                            ${tzNote}
                            ${t.description ? `<div class="hero-description">${escapeHtml(t.description)}</div>` : ''}
                        </div>
                    </div>
                </div>
            </section>`;
        }

        function renderShell() {
            document.getElementById('main').innerHTML = `
                ${renderHero()}
                <div class="tabs">
                    <div class="container">
                        <div class="tabs-inner" id="tabs">
                            <button class="tab-btn active" data-tab="calendar">Calendario</button>
                            <button class="tab-btn" data-tab="categories">Categorías</button>
                        </div>
                    </div>
                </div>
                <section class="panel" id="panel-calendar">
                    <div class="container">
                        <div id="login-cta-slot">${renderLoginCTA()}</div>
                        <div id="link-banner-slot">${renderLinkBanner()}</div>
                        <div class="search-row">
                            <div class="search-wrap${state.search ? ' has-value' : ''}" id="search-wrap">
                                <input id="search" class="search-input" type="search" inputmode="search" enterkeyhint="search" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Buscar jugador…" value="${escapeHtml(state.search)}">
                                <button id="search-clear" class="search-clear" type="button" aria-label="Limpiar búsqueda">×</button>
                            </div>
                            <button id="filter-btn" class="filter-btn${activeFilterCount() ? ' active' : ''}" type="button" aria-label="Abrir filtros">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg>
                                Filtros${activeFilterCount() ? `<span class="filter-count">${activeFilterCount()}</span>` : ''}
                            </button>
                        </div>
                        <div id="day-jump-slot">${renderDayJump()}</div>
                        <div id="my-block-slot">${renderMyBlock()}</div>
                        <div id="calendar-slot">${renderAllCalendar()}</div>
                    </div>
                </section>
                <div id="filter-sheet" class="sheet-backdrop" role="dialog" aria-modal="true" aria-labelledby="filter-sheet-title" hidden>
                    <div class="sheet">
                        <div class="sheet-handle" aria-hidden="true"></div>
                        <div class="sheet-header">
                            <div class="sheet-title" id="filter-sheet-title">Filtros</div>
                            <button type="button" class="sheet-reset" id="filter-reset">Limpiar</button>
                        </div>
                        <div class="sheet-body" id="filter-sheet-body">${renderFiltersHtml()}</div>
                        <div class="sheet-footer">
                            <button type="button" class="sheet-apply" id="filter-apply">Ver partidos</button>
                        </div>
                    </div>
                </div>
                <section class="panel" id="panel-categories" style="display: none;">
                    <div class="container">
                        <h2 class="panel-title">Categorías</h2>
                        ${renderCategoriesPanel()}
                    </div>
                </section>`;
            attachEvents();
            attachLinkBannerEvents();
            renderNavRight();
            measureStickyOffsets();
            window.addEventListener('resize', measureStickyOffsets, { passive: true });
            attachScrollCollapse();
            scrollDayJumpToToday();
            document.title = `${state.tournament.name || 'Torneo'} — CourtBit`;
        }

        function attachScrollCollapse() {
            let ticking = false;
            const onScroll = () => {
                if (ticking) return;
                ticking = true;
                requestAnimationFrame(() => {
                    document.body.classList.toggle('scrolled', window.scrollY > 8);
                    ticking = false;
                });
            };
            window.addEventListener('scroll', onScroll, { passive: true });
            onScroll();
        }

        function scrollDayJumpToToday() {
            const wrap = document.querySelector('.day-jump');
            if (!wrap) return;
            const today = wrap.querySelector('button.today');
            if (!today) return;
            const offset = today.offsetLeft - 8;
            wrap.scrollTo({ left: offset, behavior: 'auto' });
        }

        function refreshFilterBtn() {
            const btn = document.getElementById('filter-btn');
            if (!btn) return;
            const n = activeFilterCount();
            btn.classList.toggle('active', n > 0);
            btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg>Filtros${n ? `<span class="filter-count">${n}</span>` : ''}`;
        }

        function refreshDynamic() {
            const sheetBody = document.getElementById('filter-sheet-body');
            if (sheetBody) sheetBody.innerHTML = renderFiltersHtml();
            refreshFilterBtn();
            document.getElementById('my-block-slot').innerHTML = renderMyBlock();
            document.getElementById('calendar-slot').innerHTML = renderAllCalendar();
            const ctaSlot = document.getElementById('login-cta-slot');
            if (ctaSlot) ctaSlot.innerHTML = renderLoginCTA();
            refreshLinkBanner();
        }

        function measureStickyOffsets() {
            const nav = document.querySelector('nav');
            const tabs = document.querySelector('.tabs');
            const dayJump = document.querySelector('.day-jump-wrap');
            if (nav) document.documentElement.style.setProperty('--nav-h', nav.offsetHeight + 'px');
            if (tabs) document.documentElement.style.setProperty('--tabs-h', tabs.offsetHeight + 'px');
            if (dayJump) document.documentElement.style.setProperty('--day-jump-h', dayJump.offsetHeight + 'px');
            else document.documentElement.style.setProperty('--day-jump-h', '0px');
        }

        function openFilterSheet() {
            const sheet = document.getElementById('filter-sheet');
            if (!sheet) return;
            document.getElementById('filter-sheet-body').innerHTML = renderFiltersHtml();
            sheet.hidden = false;
            requestAnimationFrame(() => sheet.classList.add('open'));
            document.body.classList.add('sheet-open');
            attachSheetSwipe(sheet);
        }
        function closeFilterSheet() {
            const sheet = document.getElementById('filter-sheet');
            if (!sheet) return;
            sheet.classList.remove('open');
            document.body.classList.remove('sheet-open');
            setTimeout(() => { sheet.hidden = true; }, 280);
        }

        function attachSheetSwipe(backdrop) {
            const panel = backdrop.querySelector('.sheet');
            const body = backdrop.querySelector('.sheet-body');
            if (!panel || panel.dataset.swipeAttached === '1') return;
            panel.dataset.swipeAttached = '1';

            let startY = 0;
            let lastY = 0;
            let lastT = 0;
            let velocity = 0;
            let dragging = false;
            let dragFromBody = false;

            const onStart = (e) => {
                if (e.touches.length !== 1) return;
                const t = e.touches[0];
                const target = e.target;
                dragFromBody = !!(body && body.contains(target));
                if (dragFromBody && body.scrollTop > 0) return;
                dragging = true;
                startY = lastY = t.clientY;
                lastT = e.timeStamp;
                velocity = 0;
                panel.style.transition = 'none';
                backdrop.style.transition = 'none';
            };

            const onMove = (e) => {
                if (!dragging) return;
                const t = e.touches[0];
                const dy = t.clientY - startY;
                if (dragFromBody && dy <= 0) {
                    dragging = false;
                    panel.style.transition = '';
                    backdrop.style.transition = '';
                    panel.style.transform = '';
                    backdrop.style.background = '';
                    return;
                }
                if (dy < 0) return;
                e.preventDefault();
                panel.style.transform = `translateY(${dy}px)`;
                const h = panel.offsetHeight || 1;
                const fade = Math.max(0, 0.45 * (1 - Math.min(dy / h, 1)));
                backdrop.style.background = `rgba(15, 29, 77, ${fade})`;
                const now = e.timeStamp;
                const dt = now - lastT;
                if (dt > 0) velocity = (t.clientY - lastY) / dt;
                lastY = t.clientY;
                lastT = now;
            };

            const settle = () => {
                if (!dragging) return;
                dragging = false;
                panel.style.transition = '';
                backdrop.style.transition = '';
                const dy = lastY - startY;
                const h = panel.offsetHeight || 1;
                const shouldClose = dy > h * 0.25 || velocity > 0.6;
                if (shouldClose) {
                    panel.style.transform = '';
                    backdrop.style.background = '';
                    closeFilterSheet();
                } else {
                    panel.style.transform = '';
                    backdrop.style.background = '';
                }
            };

            panel.addEventListener('touchstart', onStart, { passive: true });
            panel.addEventListener('touchmove', onMove, { passive: false });
            panel.addEventListener('touchend', settle);
            panel.addEventListener('touchcancel', settle);
        }

        function attachEvents() {
            const searchInput = document.getElementById('search');
            const searchWrap = document.getElementById('search-wrap');
            const clearBtn = document.getElementById('search-clear');
            let debounce;
            const updateSearchVisual = () => {
                if (searchInput.value) searchWrap.classList.add('has-value');
                else searchWrap.classList.remove('has-value');
            };
            searchInput.addEventListener('input', () => {
                updateSearchVisual();
                clearTimeout(debounce);
                debounce = setTimeout(() => {
                    state.search = searchInput.value.trim();
                    refreshDynamic();
                }, 150);
            });
            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                state.search = '';
                updateSearchVisual();
                searchInput.focus();
                refreshDynamic();
            });

            const filterBtn = document.getElementById('filter-btn');
            const filterSheet = document.getElementById('filter-sheet');
            const filterApply = document.getElementById('filter-apply');
            const filterReset = document.getElementById('filter-reset');
            filterBtn.addEventListener('click', openFilterSheet);
            filterApply.addEventListener('click', closeFilterSheet);
            filterReset.addEventListener('click', () => {
                state.filterCategory = '';
                state.filterCourt = '';
                refreshDynamic();
            });
            filterSheet.addEventListener('click', e => {
                if (e.target === filterSheet) closeFilterSheet();
                const chip = e.target.closest('.filter-chip');
                if (!chip) return;
                const filter = chip.dataset.filter;
                const value = chip.dataset.value;
                if (filter === 'category') state.filterCategory = value;
                if (filter === 'court') state.filterCourt = value;
                refreshDynamic();
            });
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape' && filterSheet && !filterSheet.hidden) closeFilterSheet();
            });

            document.addEventListener('click', e => {
                const dj = e.target.closest('[data-day-jump]');
                if (!dj) return;
                scrollToDay(dj.dataset.dayJump);
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const target = btn.dataset.tab;
                    state.tab = target;
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
                    document.getElementById('panel-calendar').style.display = target === 'calendar' ? '' : 'none';
                    document.getElementById('panel-categories').style.display = target === 'categories' ? '' : 'none';
                });
            });
            document.getElementById('panel-categories').addEventListener('click', e => {
                const btn = e.target.closest('[data-cat-toggle]');
                if (!btn) return;
                const id = parseInt(btn.dataset.catToggle, 10);
                if (state.expandedCategories.has(id)) state.expandedCategories.delete(id);
                else state.expandedCategories.add(id);
                const card = btn.closest('.cat-card');
                if (card) {
                    card.classList.toggle('expanded');
                    btn.setAttribute('aria-expanded', card.classList.contains('expanded') ? 'true' : 'false');
                }
            });
        }

        async function loadMyContext(tournamentId) {
            const token = localStorage.getItem(TOKEN_KEY);
            if (!token) return;
            try {
                const res = await fetch(`${API_URL}/tournaments/${tournamentId}/my-context`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) {
                    localStorage.removeItem(TOKEN_KEY);
                    return;
                }
                if (!res.ok) return;
                const data = await res.json();
                const ids = (data?.categories || []).map(c => c.team_id).filter(Boolean);
                state.myTeamIds = new Set(ids);
            } catch (err) {
                console.warn('my-context failed', err);
            }
        }

        async function loadTournament(code) {
            try {
                const [infoRes, calRes] = await Promise.all([
                    fetch(`${API_URL}/public/tournaments/by-share-code/${code}`),
                    fetch(`${API_URL}/public/tournaments/by-share-code/${code}/calendar`)
                ]);
                if (infoRes.status === 404 || calRes.status === 404) {
                    return renderError('Torneo no encontrado', 'El enlace puede ser inválido o el torneo ya no está disponible.');
                }
                if (!infoRes.ok || !calRes.ok) {
                    return renderError('Error de servidor', 'No pudimos cargar el torneo. Intenta de nuevo en unos minutos.');
                }
                state.tournament = await infoRes.json();
                state.calendar = await calRes.json();
                await loadMyContext(state.calendar.tournament_id);
                state.pendingLinks = await loadPendingLinks(state.calendar.tournament_id);
                renderShell();
                loadTournamentTeams(code);
            } catch (err) {
                console.error(err);
                renderError('Error de red', 'No pudimos conectar con el servidor.');
            }
        }

        wireAuthModal();

        document.addEventListener('error', e => {
            const img = e.target;
            if (!img || !(img instanceof HTMLImageElement) || !img.hasAttribute('data-avatar-img')) return;
            const parent = img.parentElement;
            if (!parent) return;
            const initialsAttr = parent.getAttribute('data-initials') || '?';
            parent.classList.remove('has-photo');
            parent.textContent = initialsAttr;
        }, true);

        const code = extractShareCode();
        if (!code || code.length !== 8) {
            renderError('Falta el código del torneo', 'Abre el enlace que te compartió el organizador. Debe verse así: courtbit.com.mx/torneo/{código}');
        } else {
            loadSession();
            loadTournament(code);
        }
    </script>
</body>
